# my global config
global:
  scrape_interval: 15s # Set the scrape interval to every 60 seconds.
  evaluation_interval: 15s # Evaluate rules every 60 seconds.

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  # recording rules file has rules for aggregating partition level metrics in advance so that queries at runtime are faster
  - 'recording_rules-generated.yml'
  # trigger rules file is used for defining triggers which are configured by the user using C3 UI
  - 'trigger_rules-generated.yml'

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  # - job_name: 'kafka'
  #   static_configs:
  #     - targets: ['broker:7071']
 
  - job_name: 'kafka-broker-1'
    static_configs:
      - targets: ['broker-1:7071']
        labels:
          component: 'kafka'
          broker: 'broker-1'
 
  - job_name: 'kafka-broker-2'
    static_configs:
      - targets: ['broker-2:7071']
        labels:
          component: 'kafka'
          broker: 'broker-2'
 
  - job_name: 'kafka-broker-3'
    static_configs:
      - targets: ['broker-3:7071']
        labels:
          component: 'kafka'
          broker: 'broker-3'
 
  - job_name: 'schema-registry'
    static_configs:
      - targets: ['schema-registry:7074']
        labels:
          component: 'schema-registry'
 
  - job_name: 'kafka-connect'
    static_configs:
      - targets: ['connect:7075']
        labels:
          component: 'connect'
 
  - job_name: 'ksqldb'
    static_configs:
      - targets: ['ksqldb-server:7076']
        labels:
          component: 'ksqldb'
 
  - job_name: 'rest-proxy'
    static_configs:
      - targets: ['rest-proxy:7077']
        labels:
          component: 'rest-proxy'
# this rule helps flaten the resource attributes
# otlp:
#   promote_resource_attributes: ["host.hostname", "java.version", "kafka.broker.id", "kafka.cluster.id", "kafka.version", "type"]

# A 10min time window is enough because it can easily absorb retries and network delays.
storage:
  tsdb:
    out_of_order_time_window: 10m
